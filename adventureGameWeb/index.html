function makeCardMap() {
  const map = {};
  for (const c of BASE_CARDS) {
    map[c.id] = {
      ...c,
      links: (c.links || []).map(l => ({ ...l })),
      items: [...(c.items || [])],
      enemies: (c.enemies || []).map(e => ({ ...e }))
    };
  }
  return map;
}

let state = makeInitialState();

function card(id = state.currentCard) { return state.deck[id]; }
function enemyName(type) { return ENEMY_NAMES[type] || '(n/a)'; }
function enemyAttack(type) { return ENEMY_ATTACKS[type] || 'bonks'; }
function normalizeInput(s) { return String(s || '').trim().toLowerCase(); }
function titleOf(id) { return state.deck[id]?.name || id; }

function print(text = '') {
  const parts = String(text).replace(/\r/g, '').split('\n');
  for (const p of parts) term.lines.push(p);
  if (term.lines.length > 2400) term.lines.splice(0, term.lines.length - 2400);
  term.scroll = 0;
  requestDraw();
}

function printBlock(text = '') { print(text.replace(/^\n+/, '').replace(/\n+$/, '')); }

function setMode(mode, prompt) {
  term.mode = mode;
  term.prompt = prompt || 'Enter a command';
  term.input = '';
  requestDraw();
}

function resetMode() { setMode('main', 'Enter a command'); }

function requestDraw() {
  if (!requestDraw.pending) {
    requestDraw.pending = true;
    requestAnimationFrame(() => { requestDraw.pending = false; draw(); });
  }
}
requestDraw.pending = false;

function resizeCanvas() {
  dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = Math.floor(window.innerWidth * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h) {
    canvas.width = w;
    canvas.height = h;
  }
  requestDraw();
}
window.addEventListener('resize', resizeCanvas);

function wrapText(text, maxWidth, font) {
  ctx.font = font;
  const raw = String(text);
  if (raw === '') return [''];
  const out = [];
  for (const sourceLine of raw.split('\n')) {
    let line = '';
    const words = sourceLine.split(/(\s+)/);
    for (const word of words) {
      const test = line + word;
      if (line && ctx.measureText(test).width > maxWidth) {
        out.push(line.trimEnd());
        line = word.trimStart();
      } else {
        line = test;
      }
    }
    out.push(line.trimEnd());
  }
  return out;
}

function draw() {
  const w = canvas.width;
  const h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  const bg = ctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#101a12');
  bg.addColorStop(1, '#020402');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);

  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.strokeStyle = '#9cff9a';
  const scan = Math.max(3, Math.floor(4 * dpr));
  for (let y = 0; y < h; y += scan) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
  }
  ctx.restore();

  const pad = Math.floor(18 * dpr);
  const fontSize = Math.max(14, Math.floor(17 * dpr));
  const smallFontSize = Math.max(11, Math.floor(12 * dpr));
  const lineHeight = Math.floor(fontSize * 1.35);
  const font = `${fontSize}px Consolas, Menlo, monospace`;
  const smallFont = `${smallFontSize}px Consolas, Menlo, monospace`;
  const headerH = Math.floor(42 * dpr);

  ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
  ctx.fillRect(pad / 2, pad / 2, w - pad, h - pad);
  ctx.strokeStyle = 'rgba(124, 255, 117, 0.35)';
  ctx.lineWidth = Math.max(1, dpr);
  ctx.strokeRect(pad / 2, pad / 2, w - pad, h - pad);

  ctx.font = smallFont;
  ctx.fillStyle = '#95ff91';
  const header = `ADVENTURE // ${titleOf(state.currentCard)} // HP ${state.health} MP ${state.mana} XP ${state.xp} $${state.money} Books ${state.books}`;
  ctx.fillText(header, pad, pad + smallFontSize);

  ctx.font = font;
  const maxTextW = w - pad * 2;
  const visual = [];
  for (const l of term.lines) {
    const wrapped = wrapText(l, maxTextW, font);
    for (const sub of wrapped) visual.push(sub);
  }
  const caret = term.blink && term.focused ? '█' : ' ';
  const promptLine = `${term.prompt}> ${term.input}${caret}`;
  for (const sub of wrapText(promptLine, maxTextW, font)) visual.push(sub);

  const available = h - pad * 2 - headerH;
  const visibleCount = Math.max(1, Math.floor(available / lineHeight));
  const end = Math.max(0, visual.length - term.scroll);
  const start = Math.max(0, end - visibleCount);
  let y = pad + headerH;
  for (let i = start; i < end; i++) {
    const line = visual[i];
    if (line.startsWith('>') || line.includes('> ')) ctx.fillStyle = '#e7ffe5';
    else if (line.startsWith('***') || line.includes('received') || line.includes('Got ')) ctx.fillStyle = '#ffe7a6';
    else if (line.toLowerCase().includes('you died') || line.toLowerCase().includes('loss of')) ctx.fillStyle = '#ff9d9d';
    else ctx.fillStyle = '#b9ffb5';
    ctx.fillText(line, pad, y);
    y += lineHeight;
  }
}

function getDamage() {
  const xp = state.xp;
  if (xp > 9000) return 1000;
  if (xp > 8000) return 900;
  if (xp > 7000) return 800;
  if (xp > 6000) return 700;
  if (xp > 5000) return 600;
  if (xp > 4000) return 500;
  if (xp > 3000) return 400;
  if (xp > 2000) return 300;
  if (xp > 1000) return 200;
  if (xp > 500) return 150;
  if (xp > 200) return 120;
  if (xp > 100) return 100;
  if (xp > 50) return 50;
  if (xp > 40) return 40;
  if (xp > 30) return 30;
  return 20;
}

function printAndHandleItem(itemType) {
  switch (itemType) {
    case 'ITEM_SWORD': print('Got the sword'); state.hasSword = true; break;
    case 'ITEM_MAP': print('Got the map'); state.hasMap = true; break;
    case 'ITEM_HEALTH_POTION': print('Found health potion'); state.health += 100; break;
    case 'ITEM_MANA_POTION': print('Found mana potion'); state.mana += 100; break;
    case 'ITEM_COINS': print('Found some coins'); state.money += 100; break;
    case 'ITEM_BOOK': print('Found a book'); state.books += 1; break;
    default: print('Did not recognize item type'); break;
  }
}

function look() {
  const c = card();
  print('');
  print(`${c.name}:`);
  print(c.description || '(no description)');
  print('');
  if (!state.collectedCards[c.id] && c.items.length > 0) {
    for (const item of c.items) printAndHandleItem(item);
    state.collectedCards[c.id] = true;
  } else if (state.collectedCards[c.id]) {
    print('(nothing new to pick up here)');
  }
  if (aliveEnemies(c).length) printEnemies(c);
}

function aliveEnemies(c = card()) { return (c.enemies || []).filter(e => e.health > 0); }

function printEnemies(c = card()) {
  const enemies = aliveEnemies(c);
  if (!enemies.length) return;
  print('Enemies here:');
  for (const enemy of enemies) print(` - ${enemyName(enemy.type)} ( ${enemy.health} health, does ${enemy.damage} damage )`);
}

function printMoveChoices() {
  const c = card();
  if (!c.links.length) { print('There is nowhere obvious to move.'); return; }
  print('Places to move to:');
  for (const link of c.links) print(` - ${link.cmd} - ${titleOf(link.to)}`);
}

function moveToChoice(raw) {
  const choice = normalizeInput(raw);
  const c = card();
  const link = c.links.find(l => normalizeInput(l.cmd) === choice);
  if (!link) { print('(No Move Made)'); return false; }
  // A tiny bit of finish-work: the final gate is a spell gate, not just a hallway.
  if (link.to === 'CARD_FINAL_GATE' && aliveEnemies(c).length > 0) {
    print('The monsters block the way. Deal with them first.');
    return false;
  }
  state.currentCard = link.to;
  print(`moved to ${titleOf(state.currentCard)}`);
  onEnterCard();
  if (aliveEnemies().length) printEnemies();
  return true;
}

function onEnterCard() {
  if (state.currentCard === 'CARD_FINAL_GATE' && !state.hasRing) {
    print('The Blue Gate flares and throws you back. You need the magic ring.');
    state.currentCard = 'CARD_STARLIT_LANE';
  }
}

function buyChoice(raw) {
  const choice = normalizeInput(raw);
  if (!card().isStore) { print('You are not currently in a store.'); return; }
  if (state.money <= 0) { print('You do not have any money.'); return; }
  if (choice === 'health') {
    state.money -= 10; state.health += 100;
    print('(received 100 health)'); print('(cost $10)');
  } else if (choice === 'mana') {
    state.money -= 10; state.mana += 100;
    print('(received 100 mana)'); print('(cost $10)');
  } else {
    print("The store clerk says 'I dont have that item.'");
  }
}

function swingSword() {
  if (!state.hasSword) { print('You do not have the sword.'); return; }
  print('You swing the sword and ...');
  const c = card();
  const target = c.enemies.find(e => e.health > 0);
  if (!target) { print('There is nothing here to hit.'); return; }
  const damage = getDamage();
  print(`You hit the ${enemyName(target.type)} with the sword, they lose ${damage} health`);
  target.health -= damage;
  if (target.health <= 0) {
    print(`The ${enemyName(target.type)} is dead (gained 10 xp points)`);
    state.xp += 10;
  }
  if (!aliveEnemies(c).length) {
    print('All enemies have been delt with.');
  }
}

function handleFightSequence() {
  const enemies = aliveEnemies();
  for (const enemy of enemies) {
    print(`the ${enemyName(enemy.type)} ${enemyAttack(enemy.type)} you, loss of ${enemy.damage} health`);
    state.health -= enemy.damage;
  }
  if (state.health <= 0) {
    print(''); print('you died...'); print('');
    state.currentCard = 'CARD_HOME';
    state.health = 100;
    print('You wake up back home with 100 health.');
  }
}

function addLink(cardId, cmd, to) {
  const c = state.deck[cardId];
  if (!c.links.some(l => l.cmd === cmd && l.to === to)) c.links.push({ cmd, to });
}

function allEnemiesDead(cardId) { return aliveEnemies(state.deck[cardId]).length === 0; }

function handleCast(spellRaw) {
  const spell = normalizeInput(spellRaw);
  if (state.mana <= 0) { print('no mana'); return; }
  const manaCost = 5;
  print(`( ${manaCost} mana used )`);
  state.mana -= manaCost;
  if (spell === 'fire') {
    print('You cast fire...');
    const fp = FIREPLACE_CARDS[state.currentCard];
    if (fp) { state.fireplaces[fp[1]] = true; print(`The fire place is lit at ${fp[2]}.`); }
    else if (state.currentCard === 'CARD_TOWN_HOUSE') { print("The woman screams 'What are you doing, you are going to burn the place down!'."); state.xp += 5; print('(received 5 xp)'); }
    else print('no effect');
  } else if (spell === 'grow') {
    print('You cast grow...');
    const grow = {
      CARD_JEFFERS_GARDEN: ['tomatoes', 800],
      CARD_WILD_GARDEN: ['apples', 500],
      CARD_MCCANN_GARDEN: ['tomatoes', 800],
      CARD_STACK_HOMESTEAD: ['pumpkins', 600],
      CARD_EMBERFELL_GARDEN: ['tomatoes', 800],
      CARD_FARM_BAKER: ['beets', 1200]
    }[state.currentCard];
    if (grow) { print(`One of the ${grow[0]} grows incredibly large.`); print('You eat it.'); state.health += grow[1]; print(`(received ${grow[1]} health)`); }
    else print('no effect');
  } else if (spell === 'open') {
    const openTargets = {
      CARD_WILD_GARDEN: ['The locked shed door opens.', 'You enter the gardening shed.', 'CARD_FIRST_SHED'],
      CARD_IRONWOOD_CLEARING: ["The locked shed door opens.", "You enter the workman's shed.", 'CARD_SECOND_SHED'],
      CARD_MCCANN_GARDEN: ["The locked shed door opens.", "You enter the McCann's gardening shed.", 'CARD_THIRD_SHED'],
      CARD_WILLIAMS: ['The locked door to Town Hall opens.', 'You enter the Williams Town Hall.', 'CARD_WILLIAMS_TOWN_HALL'],
      CARD_EMBERFELL_CASTLE_ENTER: ['The locked door to Emberfell Castle opens.', 'You enter The Grand Emberfell Hall.', 'CARD_EMBERFELL_HALL'],
      CARD_CAVE_DEEP: ['The locked door to the Hidden Passage opens.', 'You enter the Hidden Passage.', 'CARD_HIDDEN_PASSAGE'],
      CARD_CAVERNS: ['The locked door to the Hidden Passage opens.', 'You enter the Hidden Passage.', 'CARD_HIDDEN_PASSAGE'],
      CARD_FINAL_GATE: ['The Blue Gate opens like a page turning.', 'You step through to Dogstar Hill.', 'CARD_DOGSTAR_HILL']
    };
    if (state.currentCard === 'CARD_EMBERFELL_TOWER' && !state.emberfellTowerChestOpened) {
      state.emberfellTowerChestOpened = true; print('The locked treasure chest opens.'); state.money += 1000; print('(received 1000 coins)');
    } else if (openTargets[state.currentCard]) {
      const [a, b, target] = openTargets[state.currentCard];
      if (state.currentCard === 'CARD_FINAL_GATE' && (!state.hasRing || !state.hasMap)) {
        print('The gate glows, but the spell fizzles. You need the ring and the map.');
      } else {
        print(a); print(b); state.currentCard = target; onEnterCard();
      }
    } else print('no effect');
  } else {
    print('I dont know that spell.');
  }
}

function printMapOptions() {
  if (!state.hasMap) { print('You do not have the map yet.'); return false; }
  print('Places you can jump to:');
  let any = false;
  for (const [name, [flag]] of Object.entries(MAP_DESTINATIONS)) {
    if (state.fireplaces[flag]) { print(` - ${name}`); any = true; }
  }
  if (!any) print(' (no lit fireplaces yet)');
  return true;
}

function mapChoice(raw) {
  const choice = normalizeInput(raw);
  const dest = MAP_DESTINATIONS[choice];
  if (dest && state.fireplaces[dest[0]]) {
    state.currentCard = dest[1];
    print(dest[2]);
    onEnterCard();
  } else {
    print('Thats not on the map.');
  }
}

function handleJovi(raw) {
  const input = normalizeInput(raw);
  const responses = [
    "Jovi says: Bark! I support this plan, but I recommend snacks first.",
    "Jovi says: Ruff ruff. The smell of adventure is coming from the north.",
    "Jovi says: I am only a dog, but even I know that glowing doors want magic.",
    "Jovi says: Books are good because people drop crumbs between the pages.",
    "Jovi says: Woof. Stay brave. Also, please do not forget I am a very good girl."
  ];
  let hash = 0;
  for (let i = 0; i < input.length; i++) hash = ((hash << 5) - hash + input.charCodeAt(i)) | 0;
  print(responses[Math.abs(hash) % responses.length]);
}

function cheatChoice(raw) {
  const s = normalizeInput(raw);
  if (s === 'give me money') { state.money += 400; print('received $400'); }
  else if (s === 'xp') { state.xp += 100; print('received 100 xp'); }
  else if (s === 'mana') { state.mana += 100; print('received 100 mana'); }
  else if (s === 'to be young') { state.health += 100; print('received 100 health'); }
  else if (s === 'map') { state.hasMap = true; print('Got the Map'); }
  else if (s === 'ring') { state.hasRing = true; print('Got the ring'); }
  else if (s === 'loop de loop') { state.loops += 100; print('gameloop counter incremented by 100'); }
  else if (s === 'devel') {
    print('developer mode');
    state.money = 100000; state.loops = 100000; state.health = 100000; state.mana = 100000; state.xp = 100000;
    state.hasRing = true; state.hasSword = true; state.hasMap = true; state.hasLastPage = true;
    for (const key of Object.keys(state.fireplaces)) state.fireplaces[key] = true;
  } else if (s === 'goto') {
    print('All Cards:');
    for (const c of Object.values(state.deck).sort((a, b) => a.index - b.index)) print(` - ${c.index} - ${c.name}`);
    setMode('goto', 'Card');
    return 'hold';
  } else {
    print('That cheat code did nothing.');
  }
}

function gotoChoice(raw) {
  const s = normalizeInput(raw);
  const byIndex = Object.values(state.deck).find(c => String(c.index) === s);
  const byId = state.deck[s.toUpperCase()] || Object.values(state.deck).find(c => normalizeInput(c.name) === s);
  const target = byIndex || byId;
  if (target) { state.currentCard = target.id; print(`jumped to ${target.name}`); onEnterCard(); }
  else print('That was not a valid card.');
}

function saveGame() {
  localStorage.setItem('adventureCanvasSave', JSON.stringify(state));
  print('(game saved to this browser)');
}

function loadGame() {
  const raw = localStorage.getItem('adventureCanvasSave');
  if (!raw) { print('(no save found in this browser)'); return; }
  try {
    const loaded = JSON.parse(raw);
    state = loaded;
    // Make sure future versions can still see all base/extra cards.
    const fresh = makeCardMap();
    state.deck = { ...fresh, ...(state.deck || {}) };
    print('(game loaded)');
    print(`You are at ${titleOf(state.currentCard)}.`);
  } catch (err) {
    print('(save file could not be loaded)');
  }
}

function advanceTurn() {
  if (!state.gameLooper) return;
  state.loops += 1;
  handleEvents();
  handleFightSequence();
}

function handleMainCommand(raw) {
  const input = normalizeInput(raw);
  if (input !== '') print(`*You entered: ${input}`);
  if (input === '') return;

  const [verb, ...restWords] = input.split(/\s+/);
  const rest = restWords.join(' ');

  if (input === 'help') { printHelp(); advanceTurn(); }
  else if (input === 'look' || input === 'l') { look(); advanceTurn(); }
  else if (verb === 'move' || verb === 'go') {
    if (rest) { moveToChoice(rest); advanceTurn(); }
    else { printMoveChoices(); setMode('move', 'Where to move?'); }
  }
  else if (input === 'status') { printStatus(); advanceTurn(); }
  else if (input === 'buy') {
    if (!card().isStore) { print('You are not currently in a store.'); advanceTurn(); }
    else { print('Items to purchase:'); print(' - health - health potion - $10'); print(' - mana   - mana   potion - $10'); setMode('buy', 'Purchase'); }
  }
  else if (input === 'sword' || input === 's') { swingSword(); advanceTurn(); }
  else if (verb === 'map') {
    if (rest) { if (state.hasMap) mapChoice(rest); else print('You do not have the map yet.'); advanceTurn(); }
    else { if (printMapOptions()) setMode('map', 'Map'); else advanceTurn(); }
  }
  else if (verb === 'jovi') {
    if (rest) { handleJovi(rest); advanceTurn(); }
    else { print('Talk to Jovi:'); setMode('jovi', 'Jovi'); }
  }
  else if (verb === 'cast') {
    if (!state.hasRing) { print('Cannot cast spells without a magical object...'); advanceTurn(); }
    else if (rest) { handleCast(rest); advanceTurn(); }
    else { print('Spellbook:'); print(' - fire'); print(' - grow'); print(' - open'); setMode('cast', 'Spell'); }
  }
  else if (input === 'cheat' && state.cheating) { print('...dirty cheater...'); setMode('cheat', 'Cheat'); }
  else if (input === 'save') { saveGame(); advanceTurn(); }
  else if (input === 'load') { loadGame(); advanceTurn(); }
  else if (input === 'restart') { state = makeInitialState(); print('Restarted.'); printIntro(); }
  else if (['quit', 'q', 'exit', 'x'].includes(input)) { print('Good Bye!'); state.gameLooper = false; }
  else { print('I dont recognize that command. (type help for help)'); advanceTurn(); }
}

function submitInput() {
  const raw = term.input;
  if (!state.gameLooper && normalizeInput(raw) !== 'restart') { print('(refresh or type restart to play again)'); term.input = ''; requestDraw(); return; }
  const shownPrompt = term.prompt;
  term.input = '';
  if (raw !== '') { term.history.push(raw); term.historyIndex = term.history.length; }
  print(`${shownPrompt}> ${raw}`);

  if (term.mode === 'main') { handleMainCommand(raw); }
  else if (term.mode === 'move') { moveToChoice(raw); resetMode(); advanceTurn(); }
  else if (term.mode === 'buy') { buyChoice(raw); resetMode(); advanceTurn(); }
  else if (term.mode === 'map') { mapChoice(raw); resetMode(); advanceTurn(); }
  else if (term.mode === 'jovi') { handleJovi(raw); resetMode(); advanceTurn(); }
  else if (term.mode === 'cast') { handleCast(raw); resetMode(); advanceTurn(); }
  else if (term.mode === 'cheat') { const r = cheatChoice(raw); if (r !== 'hold') { resetMode(); advanceTurn(); } }
  else if (term.mode === 'goto') { gotoChoice(raw); resetMode(); advanceTurn(); }
}

function printIntro() {
  print('Welcome to Adventure!');
  print('');
  print('This is the browser/canvas terminal rewrite. Type help for commands, look to inspect your current card, and move to travel.');
  print('');
  print(`${card().name}:`);
  print(card().description);
}

canvas.addEventListener('click', () => { canvas.focus(); term.focused = true; requestDraw(); });
canvas.addEventListener('focus', () => { term.focused = true; requestDraw(); });
canvas.addEventListener('blur', () => { term.focused = false; requestDraw(); });

window.addEventListener('keydown', (ev) => {
  if (ev.ctrlKey && ev.key.toLowerCase() === 'c') {
    if (!state.cheating) { print(''); print('***Cheats enabled***'); state.cheating = true; }
    ev.preventDefault(); return;
  }
  if (ev.ctrlKey && ev.key.toLowerCase() === 'l') {
    term.lines = []; ev.preventDefault(); requestDraw(); return;
  }
  if (ev.key === 'Enter') { submitInput(); ev.preventDefault(); return; }
  if (ev.key === 'Backspace') { term.input = term.input.slice(0, -1); ev.preventDefault(); requestDraw(); return; }
  if (ev.key === 'Escape') { resetMode(); term.input = ''; ev.preventDefault(); requestDraw(); return; }
  if (ev.key === 'ArrowUp') {
    if (term.history.length) { term.historyIndex = Math.max(0, term.historyIndex - 1); term.input = term.history[term.historyIndex] || ''; }
    ev.preventDefault(); requestDraw(); return;
  }
  if (ev.key === 'ArrowDown') {
    if (term.history.length) { term.historyIndex = Math.min(term.history.length, term.historyIndex + 1); term.input = term.history[term.historyIndex] || ''; }
    ev.preventDefault(); requestDraw(); return;
  }
  if (ev.key === 'PageUp') { term.scroll += 8; ev.preventDefault(); requestDraw(); return; }
  if (ev.key === 'PageDown') { term.scroll = Math.max(0, term.scroll - 8); ev.preventDefault(); requestDraw(); return; }
  if (ev.key.length === 1 && !ev.metaKey && !ev.altKey && !ev.ctrlKey) {
    term.input += ev.key;
    ev.preventDefault(); requestDraw();
  }
});

canvas.addEventListener('wheel', (ev) => {
  term.scroll = Math.max(0, term.scroll + Math.sign(ev.deltaY) * 4);
  ev.preventDefault(); requestDraw();
}, { passive: false });

setInterval(() => { term.blink = !term.blink; requestDraw(); }, 520);
resizeCanvas();
canvas.focus();
printIntro();</script>
